<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .nav-link { font-weight: 700; color: #4b5563 !important; margin: 0 15px; }
        .brand-text { font-weight: 900; color: var(--border-color); }
        .quiz-container { margin: 30px 0; display: flex; justify-content: center; }
        .quiz-card { width: 95%; max-width: 450px; background: #fff; border-radius: 40px; padding: 30px; border: 4px solid #2f3542; box-shadow: 8px 8px 0px #2f3542; text-align: center; display: flex; flex-direction: column; min-height: 550px; }
        .status-badge { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: 700; color: #2f3542; margin-bottom: 20px; border: 3px solid #2f3542; }
        .mode-study { background: var(--study-color); }
        .mode-quiz { background: var(--quiz-color); }
        .char-display { font-size: 5rem; font-weight: 900; color: #2f3542; margin: 10px 0; }
        .meta-info { font-size: 1.3rem; color: #57606f; min-height: 4em; }
        .btn-audio { background: #eee; border: 3px solid #2f3542; width: 100%; padding: 12px; border-radius: 15px; font-weight: 600; margin-bottom: 15px; }
        .btn-action { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #2f3542; background: var(--study-color); color: #2f3542; font-weight: 800; }
        .btn-opt { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 3px solid #2f3542; background: #fff; font-weight: 600; }
        .correct { background: #7bed9f !important; }
        .wrong { background: #ff6b81 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span class="brand-text">AlunchineseGames</span>
            </a>
        </div>
    </nav>

    <div class="quiz-container">
        <div class="quiz-card">
            <div id="quiz-header" class="status-badge mode-study">กำลังโหลด...</div>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <h1 class="char-display" id="char">-</h1>
                <div id="meta" class="meta-info">-</div>
            </div>
            <div id="controls"></div>
        </div>
    </div>

    <div class="modal fade" id="scoreModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-5 p-4 text-center border-4 border-dark">
                <h2>เรียนเก่งมาก! 🌟</h2>
                <h1 id="score-text" class="display-1 fw-bold my-4">0/10</h1>
                <button class="btn btn-warning btn-lg w-100 rounded-pill border-dark border-3" onclick="window.location.href='game.html'">กลับห้องเรียน</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // --- ระบบเสียงรองรับทุก Browser (SpeechSynthesis + Fallback) ---
    function speak(text) {
        // 1. ยกเลิกเสียงที่กำลังเล่นค้างอยู่
        window.speechSynthesis.cancel();

        // 2. สร้างเสียงใหม่
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.8;
        utterance.pitch = 1;
        utterance.volume = 1;

        // 3. ปรับจูน Voice (สำหรับ iOS/Android)
        const voices = window.speechSynthesis.getVoices();
        const chineseVoice = voices.find(v => v.lang === 'zh-CN' || v.lang === 'zh-Hans') || voices[0];
        if (chineseVoice) utterance.voice = chineseVoice;

        // 4. บังคับให้ Browser เล่น (ถ้าติด Autoplay ให้ลองสั่งเล่นอีกครั้ง)
        window.speechSynthesis.speak(utterance);
        
        // --- ส่วนแก้ไขมือถือโดยเฉพาะ ---
        // ถ้าเป็น iOS/Mobile บางครั้งต้องมี "การคลิกปลุก" ซ้ำ
        console.log("พยายามพูด: " + text);
    }

    // แก้ไขฟังก์ชัน render ในส่วนของปุ่ม
    function render() {
        // ... (โค้ด render ส่วนเดิม)
        const audioBtn = document.createElement('button');
        audioBtn.className = 'btn-audio';
        audioBtn.innerHTML = '🔊 ฟังเสียง';
        
        // เพิ่ม event เพื่อ "ปลุก" ระบบเสียงในทุกๆ เบราว์เซอร์
        audioBtn.onclick = () => {
            // ปลุก context ด้วยการเล่นเสียงเปล่าๆ 1 ครั้ง
            const silent = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silent);
            
            // เล่นเสียงจริง
            speak(q.chinese);
        };
        document.getElementById('controls').appendChild(audioBtn);
        // ... (โค้ดที่เหลือเดิม)
    }
</script>
</body>
</html>
