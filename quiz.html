<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .quiz-container { margin: 30px 0; display: flex; justify-content: center; }
        .quiz-card { 
            width: 95%; max-width: 450px; background: #fff; border-radius: 40px; 
            padding: 40px; border: 4px solid var(--border-color); 
            box-shadow: 8px 8px 0px var(--border-color); text-align: center;
            display: flex; flex-direction: column; min-height: 550px;
        }
        #controls { display: flex; flex-direction: column; gap: 15px; margin-top: auto; }
        .btn-audio, .btn-action, .btn-opt { 
            width: 100%; padding: 18px; border-radius: 20px; 
            border: 3px solid var(--border-color); font-weight: 800; cursor: pointer;
        }
        .btn-audio { background: #ffeaa7; }
        .btn-action { background: var(--study-color); }
        .btn-opt { background: #fff; }
        .correct { background: #7bed9f !important; }
        .wrong { background: #ff6b81 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span style="font-weight: 900; color: #2f3542;">AlunchineseGames</span>
            </a>
        </div>
    </nav>

    <div class="quiz-container">
        <div class="quiz-card" id="quiz-card">
            <div id="quiz-header" class="badge bg-dark mb-3">กำลังโหลด...</div>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <h1 id="char" style="font-size: 5rem; font-weight: 900;">-</h1>
                <div id="meta" style="font-size: 1.3rem; margin-top: 15px;">-</div>
            </div>
            <div id="controls"></div>
        </div>
    </div>

    <script>
        // ระบบปลดล็อกเสียง (สำคัญสำหรับ iPhone)
        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            const context = new (window.AudioContext || window.webkitAudioContext)();
            context.resume();
            audioUnlocked = true;
        }
        document.addEventListener('touchstart', unlockAudio, {once: true});
        document.addEventListener('click', unlockAudio, {once: true});

        function playAudio(text) {
            unlockAudio();
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q=${encodeURIComponent(text)}`;
            new Audio(url).play().catch(() => alert("กดที่หน้าจอ 1 ครั้งเพื่อเริ่มเสียงครับ"));
        }

        const params = new URLSearchParams(window.location.search);
        const level = params.get('level') || '1';
        let data = [], currentIdx = 0, mode = 'study', score = 0;

        async function loadData() {
            const res = await fetch(`data/level${level}.json?t=${Date.now()}`);
            data = await res.json();
            render();
        }

        function render() {
            const q = data[currentIdx];
            document.getElementById('quiz-header').innerText = (mode === 'study' ? '📖 บทเรียน' : '✏️ ทดสอบ') + ` (${currentIdx + 1}/${data.length})`;
            document.getElementById('char').innerText = q.chinese;
            document.getElementById('meta').innerHTML = `${q.pinyin}<br><span class="fw-bold">${q.thaiRead} : ${q.thaiMeaning}</span>`;
            
            const ctrl = document.getElementById('controls');
            ctrl.innerHTML = `<button class="btn-audio" onclick="playAudio('${q.chinese}')">🔊 ฟังเสียง</button>`;

            if (mode === 'study') {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = (currentIdx === data.length - 1) ? "เข้าสู่บททดสอบ!" : "ประโยคถัดไป";
                btn.onclick = () => { if(currentIdx === data.length - 1) { mode = 'quiz'; currentIdx = 0; } else { currentIdx++; } render(); };
                ctrl.appendChild(btn);
            } else {
                let opts = [q.thaiMeaning];
                while(opts.length < 4) { let r = data[Math.floor(Math.random() * data.length)].thaiMeaning; if(!opts.includes(r)) opts.push(r); }
                opts.sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = opt;
                    b.onclick = () => { if(opt === q.thaiMeaning) { score++; b.classList.add('correct'); } else { b.classList.add('wrong'); } setTimeout(() => { currentIdx++; if(currentIdx < data.length) render(); else alert('จบแล้ว! ได้คะแนน ' + score); }, 600); };
                    ctrl.appendChild(b);
                });
            }
        }
        loadData();
    </script>
</body>
</html>
