<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .brand-text { font-weight: 900; color: var(--border-color); }
        .quiz-container { margin: 30px 0; display: flex; justify-content: center; }
        .quiz-card { width: 95%; max-width: 450px; background: #fff; border-radius: 40px; padding: 30px; border: 4px solid #2f3542; box-shadow: 8px 8px 0px #2f3542; text-align: center; display: flex; flex-direction: column; min-height: 550px; }
        .status-badge { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: 700; color: #2f3542; margin-bottom: 20px; border: 3px solid #2f3542; }
        .mode-study { background: var(--study-color); }
        .mode-quiz { background: var(--quiz-color); }
        .char-display { font-size: 5rem; font-weight: 900; color: #2f3542; margin: 10px 0; }
        .meta-info { font-size: 1.3rem; color: #57606f; min-height: 4em; }
        .btn-audio { background: #eee; border: 3px solid #2f3542; width: 100%; padding: 12px; border-radius: 15px; font-weight: 600; margin-bottom: 15px; cursor: pointer; }
        .btn-action { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #2f3542; background: var(--study-color); color: #2f3542; font-weight: 800; cursor: pointer; }
        .btn-opt { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 3px solid #2f3542; background: #fff; font-weight: 600; cursor: pointer; }
        .correct { background: #7bed9f !important; }
        .wrong { background: #ff6b81 !important; }
    </style>
</head>
<body onclick="ensureAudio()"> <!-- เทคนิค: คลิกที่ไหนก็ได้เพื่อปลดล็อกเสียง -->

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span class="brand-text">AlunchineseGames</span>
            </a>
        </div>
    </nav>

    <div class="quiz-container">
        <div class="quiz-card">
            <div id="quiz-header" class="status-badge mode-study">กำลังโหลด...</div>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <h1 class="char-display" id="char">-</h1>
                <div id="meta" class="meta-info">-</div>
            </div>
            <div id="controls"></div>
        </div>
    </div>

    <!-- Modal จบเกม -->
    <div class="modal fade" id="scoreModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-5 p-4 text-center border-4 border-dark">
                <h2>เรียนเก่งมาก! 🌟</h2>
                <h1 id="score-text" class="display-1 fw-bold my-4">0/10</h1>
                <button class="btn btn-warning btn-lg w-100 rounded-pill border-dark border-3" onclick="window.location.href='game.html'">กลับห้องเรียน</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ระบบเสียง: พยายามเล่นโดยไม่ขึ้น Alert รบกวน
        let audioReady = false;
        function ensureAudio() {
            if (audioReady) return;
            const silence = new Audio();
            silence.play().catch(() => {});
            audioReady = true;
        }

        function playAudio(text) {
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q=${encodeURIComponent(text)}`;
            new Audio(url).play().catch(() => {
                console.log("เสียงกำลังรอการโต้ตอบ...");
            });
        }

        const params = new URLSearchParams(window.location.search);
        const level = params.get('level') || '1';
        let data = [], currentIdx = 0, mode = 'study', score = 0;

        async function loadData() {
            try {
                const response = await fetch(`data/level${level}.json?t=${Date.now()}`);
                data = await response.json();
                render();
            } catch (err) { document.getElementById('quiz-header').innerText = "โหลดด่านไม่สำเร็จ"; }
        }

        function render() {
            const q = data[currentIdx];
            const header = document.getElementById('quiz-header');
            header.innerText = (mode === 'study' ? '📖 บทเรียน' : '✏️ ทดสอบ') + ` (${currentIdx + 1}/${data.length})`;
            header.className = 'status-badge ' + (mode === 'study' ? 'mode-study' : 'mode-quiz');
            document.getElementById('char').innerText = q.chinese;
            
            const ctrl = document.getElementById('controls');
            ctrl.innerHTML = '';

            const audioBtn = document.createElement('button');
            audioBtn.className = 'btn-audio';
            audioBtn.innerText = '🔊 ฟังเสียง';
            audioBtn.onclick = () => playAudio(q.chinese);
            ctrl.appendChild(audioBtn);

            if (mode === 'study') {
                document.getElementById('meta').innerHTML = `${q.pinyin}<br><span class="fw-bold text-dark">${q.thaiRead} : ${q.thaiMeaning}</span>`;
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = (currentIdx === data.length - 1) ? "เข้าสู่บททดสอบ!" : "ประโยคถัดไป";
                btn.onclick = () => { if(currentIdx === data.length - 1) { mode = 'quiz'; currentIdx = 0; } else { currentIdx++; } render(); };
                ctrl.appendChild(btn);
            } else {
                document.getElementById('meta').innerHTML = `${q.pinyin}<br><span class="fw-bold text-dark">${q.thaiRead}</span>`;
                let opts = [q.thaiMeaning];
                while(opts.length < 4) { let r = data[Math.floor(Math.random() * data.length)].thaiMeaning; if(!opts.includes(r)) opts.push(r); }
                opts.sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = opt;
                    b.onclick = () => { if(opt === q.thaiMeaning) { score++; b.classList.add('correct'); } else { b.classList.add('wrong'); } setTimeout(() => { currentIdx++; if(currentIdx < data.length) render(); else showResult(); }, 600); };
                    ctrl.appendChild(b);
                });
            }
        }

        function showResult() {
            new Audio('https://actions.google.com/sounds/v1/ui/positive_tones.ogg').play();
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            document.getElementById('score-text').innerText = `${score}/${data.length}`;
            new bootstrap.Modal(document.getElementById('scoreModal')).show();
        }

        loadData();
    </script>
</body>
</html>
