<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .quiz-card { background: #fff; border: 4px solid var(--border-color); border-radius: 30px; padding: 30px; margin: 20px auto; max-width: 450px; text-align: center; }
        .btn-start-audio { background: #ff6b81; color: white; padding: 20px; border-radius: 20px; border: 3px solid var(--border-color); font-weight: bold; cursor: pointer; }
        .btn-audio { background: #eee; border: 3px solid var(--border-color); width: 100%; padding: 12px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="quiz-card">
            <div id="setup-area">
                <p>ยินดีต้อนรับเข้าสู่เกม</p>
                <button class="btn-start-audio" onclick="unlockAudio()">กดปุ่มนี้เพื่อเปิดใช้งานระบบเสียง</button>
            </div>
            <div id="game-area" style="display:none;">
                <h1 id="char" style="font-size: 5rem;">-</h1>
                <div id="controls"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. ระบบปลดล็อกเสียงแบบชัดเจน
        function unlockAudio() {
            // สร้างเสียงว่างๆ เพื่อปลดล็อก
            const silent = new SpeechSynthesisUtterance(" ");
            window.speechSynthesis.speak(silent);
            
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            loadData();
        }

        const params = new URLSearchParams(window.location.search);
        const level = params.get('level');
        let data = [];

        async function loadData() {
            const response = await fetch(`data/level${level}.json`);
            data = await response.json();
            render(0);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        }

        function render(idx) {
            const q = data[idx];
            document.getElementById('char').innerText = q.chinese;
            document.getElementById('controls').innerHTML = `<button class="btn-audio" onclick="speak('${q.chinese}')">🔊 ฟังเสียง</button>`;
        }
    </script>
</body>
</html>
