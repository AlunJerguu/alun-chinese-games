<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .brand-text { font-weight: 900; color: var(--border-color); font-size: 1.3rem; }
        
        .quiz-container { margin: 20px auto; display: flex; justify-content: center; padding: 0 15px; }
        .quiz-card { 
            width: 100%; max-width: 450px; background: #fff; border-radius: 30px; 
            padding: 25px; border: 4px solid var(--border-color); 
            box-shadow: 6px 6px 0px var(--border-color); text-align: center;
            display: flex; flex-direction: column; min-height: 450px;
        }

        .status-badge { display: inline-block; padding: 5px 20px; border-radius: 20px; font-weight: 700; color: var(--border-color); margin-bottom: 15px; border: 3px solid var(--border-color); }
        .mode-study { background: var(--study-color); }
        .mode-quiz { background: var(--quiz-color); }
        
        .char-display { font-size: 4rem; font-weight: 900; color: var(--border-color); margin: 5px 0; }
        .meta-info { font-size: 1.1rem; color: #57606f; min-height: 3.5em; }
        
        .btn-audio { background: #ffeaa7; border: 3px solid var(--border-color); width: 100%; padding: 12px; border-radius: 15px; font-weight: 600; margin-bottom: 10px; cursor: pointer; }
        .btn-action { width: 100%; padding: 12px; border-radius: 15px; border: 3px solid var(--border-color); background: var(--study-color); font-weight: 800; cursor: pointer; }
        .btn-opt { width: 100%; padding: 12px; margin: 6px 0; border-radius: 15px; border: 3px solid var(--border-color); background: #fff; font-weight: 600; cursor: pointer; }
        
        .correct { background: #7bed9f !important; }
        .wrong { background: #ff6b81 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span class="brand-text">AlunchineseGames</span>
            </a>
        </div>
    </nav>

    <div class="quiz-container">
        <div class="quiz-card">
            <div id="quiz-header" class="status-badge mode-study">กำลังโหลด...</div>
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <h1 class="char-display" id="char">-</h1>
                <div id="meta" class="meta-info">-</div>
            </div>
            <div id="controls"></div>
        </div>
    </div>

    <div class="modal fade" id="scoreModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-5 p-4 text-center border-4 border-dark">
                <h2>เรียนเก่งมาก! 🌟</h2>
                <h1 id="score-text" class="display-3 fw-bold my-3">0/10</h1>
                <button class="btn btn-warning btn-lg w-100 rounded-pill border-dark border-3" onclick="window.location.href='game.html'">กลับห้องเรียน</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ระบบเสียงพูด
        function playAudio(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        // ระบบเสียงประกอบ (Sound Effects) แบบ Preload
        const sounds = {
            click: new Audio('https://actions.google.com/sounds/v1/ui/button_toggle.ogg'),
            correct: new Audio('https://actions.google.com/sounds/v1/ui/positive_tones.ogg'),
            wrong: new Audio('https://actions.google.com/sounds/v1/ui/negative_tones.ogg')
        };

        function playSound(type) {
            sounds[type].currentTime = 0;
            sounds[type].play().catch(() => {});
        }

        const params = new URLSearchParams(window.location.search);
        const level = params.get('level') || '1';
        let data = [], currentIdx = 0, mode = 'study', score = 0;

        async function loadData() {
            try {
                const response = await fetch(`data/level${level}.json?t=${Date.now()}`);
                data = await response.json();
                render();
            } catch (err) { document.getElementById('quiz-header').innerText = "โหลดด่านไม่สำเร็จ"; }
        }

        function render() {
            const q = data[currentIdx];
            const header = document.getElementById('quiz-header');
            header.innerText = (mode === 'study' ? '📖 บทเรียน' : '✏️ ทดสอบ') + ` (${currentIdx + 1}/${data.length})`;
            header.className = 'status-badge ' + (mode === 'study' ? 'mode-study' : 'mode-quiz');
            document.getElementById('char').innerText = q.chinese;
            
            const ctrl = document.getElementById('controls');
            ctrl.innerHTML = '';

            const audioBtn = document.createElement('button');
            audioBtn.className = 'btn-audio';
            audioBtn.innerText = '🔊 ฟังเสียง';
            audioBtn.onclick = () => { playSound('click'); playAudio(q.chinese); };
            ctrl.appendChild(audioBtn);

            if (mode === 'study') {
                document.getElementById('meta').innerHTML = `${q.pinyin}<br><span class="fw-bold text-dark">${q.thaiRead} : ${q.thaiMeaning}</span>`;
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = (currentIdx === data.length - 1) ? "เข้าสู่บททดสอบ!" : "ประโยคถัดไป";
                btn.onclick = () => { playSound('click'); if(currentIdx === data.length - 1) { mode = 'quiz'; currentIdx = 0; } else { currentIdx++; } render(); };
                ctrl.appendChild(btn);
            } else {
                document.getElementById('meta').innerHTML = `${q.pinyin}<br><span class="fw-bold text-dark">${q.thaiRead}</span>`;
                let opts = [q.thaiMeaning];
                while(opts.length < 4) { let r = data[Math.floor(Math.random() * data.length)].thaiMeaning; if(!opts.includes(r)) opts.push(r); }
                opts.sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = opt;
                    b.onclick = () => { 
                        if(opt === q.thaiMeaning) { 
                            playSound('correct'); 
                            score++; b.classList.add('correct'); 
                        } else { 
                            playSound('wrong'); 
                            b.classList.add('wrong'); 
                        } 
                        setTimeout(() => { currentIdx++; if(currentIdx < data.length) render(); else showResult(); }, 600); 
                    };
                    ctrl.appendChild(b);
                });
            }
        }

        function showResult() {
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            document.getElementById('score-text').innerText = `${score}/${data.length}`;
            new bootstrap.Modal(document.getElementById('scoreModal')).show();
        }

        loadData();
    </script>
</body>
</html>
