<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .quiz-container { margin: 30px 0; display: flex; justify-content: center; }
        .quiz-card { width: 95%; max-width: 450px; background: #fff; border-radius: 40px; padding: 30px; border: 4px solid #2f3542; box-shadow: 8px 8px 0px #2f3542; text-align: center; }
        .btn-audio { background: #eee; border: 3px solid #2f3542; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="quiz-card">
            <div id="quiz-header" class="status-badge">กำลังโหลด...</div>
            <h1 id="char" style="font-size: 5rem; font-weight: 900;">-</h1>
            <div id="meta" style="font-size: 1.3rem; min-height: 4em;">-</div>
            <div id="controls"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ระบบเตรียมเสียง (Audio Unlocker)
        let isAudioAllowed = false;
        
        function tryUnlockAudio() {
            if (isAudioAllowed) return;
            const context = new (window.AudioContext || window.webkitAudioContext)();
            if (context.state === 'suspended') {
                context.resume().then(() => {
                    isAudioAllowed = true;
                    console.log("เสียงถูกปลดล็อกแล้ว");
                });
            }
        }

        // ปลดล็อกเมื่อมีการแตะหน้าจอครั้งแรก
        window.addEventListener('touchstart', tryUnlockAudio, { once: true });
        window.addEventListener('click', tryUnlockAudio, { once: true });

        const params = new URLSearchParams(window.location.search);
        const level = params.get('level');
        let data = [], currentIdx = 0;

        async function loadData() {
            try {
                const response = await fetch(`data/level${level}.json`);
                data = await response.json();
                render();
            } catch (err) { document.getElementById('quiz-header').innerText = "โหลดข้อมูลไม่สำเร็จ"; }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function render() {
            const q = data[currentIdx];
            document.getElementById('quiz-header').innerText = `บทเรียน (${currentIdx + 1}/${data.length})`;
            document.getElementById('char').innerText = q.chinese;
            document.getElementById('controls').innerHTML = '';

            const btn = document.createElement('button');
            btn.className = 'btn-audio';
            btn.innerHTML = '🔊 ฟังเสียง';
            // ผูกฟังก์ชัน speak แบบตรงไปตรงมา
            btn.onclick = () => {
                tryUnlockAudio();
                speak(q.chinese);
            };
            document.getElementById('controls').appendChild(btn);
        }

        loadData();
    </script>
</body>
</html>
