<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .quiz-card { background: #fff; border: 4px solid var(--border-color); border-radius: 30px; padding: 30px; margin: 20px auto; max-width: 450px; box-shadow: 8px 8px 0px var(--border-color); }
        .btn-audio { background: #ffeaa7; border: 3px solid var(--border-color); width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; margin-bottom: 20px; }
        .btn-opt { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 3px solid var(--border-color); background: #fff; font-weight: 600; }
        .correct { background: #7bed9f !important; }
        .wrong { background: #ff6b81 !important; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="quiz-card text-center">
            <div id="quiz-header" class="fw-bold mb-3">กำลังโหลด...</div>
            <h1 id="char" class="display-1 fw-bold my-4">-</h1>
            <div id="meta" class="mb-4 text-muted">-</div>
            <button id="btn-sound" class="btn-audio"><i class="bi bi-volume-up-fill"></i> ฟังเสียง</button>
            <div id="controls"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const level = params.get('level');
        let data = [], currentIdx = 0, mode = 'study', score = 0;

        async function loadData() {
            try {
                const response = await fetch(`data/level${level}.json`);
                data = await response.json();
                render();
            } catch (e) { document.getElementById('quiz-header').innerText = "โหลดข้อมูลไม่สำเร็จ"; }
        }

        // ระบบเสียง: ป้องกันการถูกบล็อกบนมือถือ
        function playSound(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        // กระตุ้นระบบเสียงเมื่อผู้ใช้แตะหน้าจอครั้งแรก
        document.addEventListener('touchstart', () => {
            const silent = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silent);
        }, { once: true });

        document.getElementById('btn-sound').onclick = () => playSound(data[currentIdx].chinese);

        function render() {
            const q = data[currentIdx];
            document.getElementById('quiz-header').innerText = (mode === 'study' ? '📖 เรียนรู้' : '✏️ ทดสอบ') + ` (${currentIdx + 1}/${data.length})`;
            document.getElementById('char').innerText = q.chinese;
            document.getElementById('controls').innerHTML = '';

            if (mode === 'study') {
                document.getElementById('meta').innerHTML = `${q.pinyin}<br><b>${q.thaiRead} : ${q.thaiMeaning}</b>`;
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary w-100 p-3 fw-bold';
                btn.innerText = (currentIdx === data.length - 1) ? "เริ่มทดสอบ!" : "ประโยคถัดไป";
                btn.onclick = () => { 
                    if(currentIdx === data.length - 1) { mode = 'quiz'; currentIdx = 0; render(); } 
                    else { currentIdx++; render(); } 
                };
                document.getElementById('controls').appendChild(btn);
            } else {
                document.getElementById('meta').innerText = q.pinyin;
                let opts = [q.thaiMeaning];
                while(opts.length < 4) { 
                    let r = data[Math.floor(Math.random() * data.length)].thaiMeaning; 
                    if(!opts.includes(r)) opts.push(r); 
                }
                opts.sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-opt';
                    b.innerText = opt;
                    b.onclick = () => {
                        if(opt === q.thaiMeaning) { b.classList.add('correct'); score++; }
                        else b.classList.add('wrong');
                        setTimeout(() => { currentIdx++; if(currentIdx < data.length) render(); else alert("คะแนน: " + score); }, 600);
                    };
                    document.getElementById('controls').appendChild(b);
                });
            }
        }
        loadData();
    </script>
</body>
</html>
