<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .quiz-container { margin: 30px 0; display: flex; justify-content: center; }
        .quiz-card { width: 95%; max-width: 450px; background: #fff; border-radius: 40px; padding: 30px; border: 4px solid #2f3542; box-shadow: 8px 8px 0px #2f3542; text-align: center; }
        .btn-audio { background: #ff6b81; color: white; border: 3px solid #2f3542; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-game { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #2f3542; background: #fff; margin: 10px 0; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="quiz-card" id="main-card">
            <div id="unlock-screen">
                <h3>ยินดีต้อนรับ</h3>
                <p>กดปุ่มนี้เพื่อเปิดใช้งานระบบเสียงก่อนเริ่มเล่น</p>
                <button class="btn-audio" onclick="initSystem()">🔊 เริ่มต้นใช้งาน</button>
            </div>

            <div id="game-ui" style="display:none;">
                <div id="quiz-header" class="status-badge mb-3">บทเรียน</div>
                <h1 id="char" style="font-size: 5rem; font-weight: 900;">-</h1>
                <div id="meta" class="mb-3">-</div>
                <div id="controls"></div>
            </div>
        </div>
    </div>

    <script>
        let data = [], currentIdx = 0, mode = 'study', score = 0;

        // ฟังก์ชันปลดล็อกเสียงและโหลดเกม
        async function initSystem() {
            // สร้างเสียงว่างๆ เพื่อปลุกระบบเสียงของ iOS
            const silent = new Audio();
            silent.play();
            
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            
            const params = new URLSearchParams(window.location.search);
            const level = params.get('level');
            const response = await fetch(`data/level${level}.json`);
            data = await response.json();
            render();
        }

        function speak(text) {
            // ใช้ Google TTS ในรูปแบบ MP3 (ชัวร์ที่สุด)
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-CN&client=tw-ob&q=${encodeURIComponent(text)}`;
            const audio = new Audio(url);
            audio.play();
        }

        function render() {
            const q = data[currentIdx];
            document.getElementById('char').innerText = q.chinese;
            document.getElementById('controls').innerHTML = `<button class="btn-audio" onclick="speak('${q.chinese}')">🔊 ฟังเสียง</button>`;
            document.getElementById('meta').innerHTML = `${q.pinyin}<br>${q.thaiMeaning}`;
        }
    </script>
</body>
</html>
