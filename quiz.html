<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --study-color: #00d2d3; --quiz-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; }
        .quiz-container { margin: 30px 0; display: flex; justify-content: center; }
        .quiz-card { width: 95%; max-width: 450px; background: #fff; border-radius: 40px; padding: 30px; border: 4px solid #2f3542; box-shadow: 8px 8px 0px #2f3542; text-align: center; display: flex; flex-direction: column; min-height: 550px; }
        .status-badge { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: 700; color: #2f3542; margin-bottom: 20px; border: 3px solid #2f3542; }
        .btn-audio { background: #ffeaa7; border: 3px solid #2f3542; width: 100%; padding: 15px; border-radius: 15px; font-weight: 800; margin-bottom: 15px; cursor: pointer; }
        .btn-action { width: 100%; padding: 15px; border-radius: 15px; border: 3px solid #2f3542; background: var(--study-color); font-weight: 800; cursor: pointer; }
        .btn-opt { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 3px solid #2f3542; background: #fff; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="quiz-card">
            <div id="quiz-header" class="status-badge">กำลังเตรียมระบบเสียง...</div>
            <h1 id="char" style="font-size: 5rem; font-weight: 900;">-</h1>
            <div id="meta" style="font-size: 1.3rem; min-height: 4em;">-</div>
            <div id="controls"></div>
            <div id="debug-log" style="font-size: 0.8rem; color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const level = params.get('level');
        let data = [], currentIdx = 0, mode = 'study', score = 0;

        // ระบบเสียง: เลือก Voice ภาษาจีนที่ดีที่สุด
        function getVoice() {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => v.lang === 'zh-CN' || v.lang === 'zh-Hans') || voices[0];
        }

        function speak(text) {
            const log = document.getElementById('debug-log');
            try {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.voice = getVoice();
                msg.lang = 'zh-CN';
                msg.volume = 1;
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
                log.innerText = "กำลังเล่น: " + text;
            } catch (e) {
                log.innerText = "Error: " + e.message;
            }
        }

        // โหลด Voice เมื่อพร้อม
        window.speechSynthesis.onvoiceschanged = () => {
            document.getElementById('quiz-header').innerText = "พร้อมใช้งาน";
        };

        async function loadData() {
            try {
                const response = await fetch(`data/level${level}.json`);
                data = await response.json();
                render();
            } catch (e) { document.getElementById('quiz-header').innerText = "โหลดข้อมูลไม่พบ"; }
        }

        function render() {
            const q = data[currentIdx];
            document.getElementById('quiz-header').innerText = (mode === 'study' ? '📖 เรียน' : '✏️ สอบ') + ` (${currentIdx + 1}/${data.length})`;
            document.getElementById('char').innerText = q.chinese;
            document.getElementById('controls').innerHTML = '';

            const btn = document.createElement('button');
            btn.className = 'btn-audio';
            btn.innerHTML = '🔊 ฟังเสียง';
            btn.onclick = () => speak(q.chinese);
            document.getElementById('controls').appendChild(btn);

            // ส่วนที่เหลือของ Logic เดิม...
            if (mode === 'study') {
                document.getElementById('meta').innerHTML = `${q.pinyin}<br><b>${q.thaiRead}</b>`;
                const next = document.createElement('button');
                next.className = 'btn-action';
                next.innerText = "ถัดไป";
                next.onclick = () => { currentIdx++; if(currentIdx >= data.length) { mode='quiz'; currentIdx=0; } render(); };
                document.getElementById('controls').appendChild(next);
            } else {
                // Logic สอบเดิม...
            }
        }
        loadData();
    </script>
</body>
</html>
