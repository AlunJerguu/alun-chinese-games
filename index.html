<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>AlunchineseGames - ห้องเรียนภาษาจีน</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f7f1e3; font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        
        .navbar { border-bottom: 4px solid #2f3542; background: #fdfaf0 !important; padding: 15px 0; }
        .brand-text { font-weight: 900; color: #2f3542; font-size: 1.5rem; }

        /* ปรับ Hero Section ให้ยืดหยุ่นตามหน้าจอมือถือ */
        .hero { text-align: center; padding: 60px 20px; }
        .hero h1 { font-weight: 900; color: #2f3542; font-size: 2.5rem; line-height: 1.2; }
        
        /* ปรับปุ่มให้ไม่ใหญ่จนล้นจอในมือถือ */
        .btn-hero { font-size: 1.2rem; padding: 15px 40px !important; }

        /* ปรับ Offcanvas ในมือถือให้ดูดี */
        .offcanvas { width: 80% !important; border-right: 4px solid #2f3542; background: #fdfaf0; }
        .nav-link { font-size: 1.2rem; padding: 15px !important; }

        /* Media Query สำหรับจอมือถือเล็ก */
        @media (max-width: 576px) {
            .hero h1 { font-size: 2rem; }
            .hero { padding: 40px 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span class="brand-text">AlunchineseGames</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="d-none d-lg-block">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link" href="game.html">เริ่มเล่นเกม</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title fw-bold">เมนู</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">หน้าแรก</a></li>
                <li class="nav-item"><a class="nav-link" href="game.html">เริ่มเล่นเกม</a></li>
            </ul>
        </div>
    </div>

    <div class="hero container">
        <h1>ยินดีต้อนรับสู่ <br>AlunchineseGames</h1>
        <p class="text-muted fs-5 mt-2">ห้องเรียนภาษาจีนที่สนุกที่สุด</p>
        <a href="game.html" class="btn btn-warning btn-hero border-dark border-3 rounded-pill mt-4 fw-bold shadow-sm">เข้าสู่ห้องเรียน</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
