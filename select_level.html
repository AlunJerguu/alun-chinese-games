<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - เลือกเลเวล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; padding: 20px; }
        
        .header-box { text-align: center; margin-bottom: 30px; }
        .header-box h2 { font-weight: 900; color: var(--border-color); font-size: 1.8rem; }
        
        /* โครงสร้างเดิม level-grid ถูกรักษาไว้ แต่ปรับ CSS ให้แสดงผลแบบเส้นทาง */
        .level-grid { 
            display: flex; flex-direction: column; align-items: center; 
            max-width: 400px; margin: 0 auto; gap: 20px;
        }
        
        .level-card { 
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-weight: 900; font-size: 1.5rem;
            background: #fff; border: 5px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color); 
            transition: all 0.2s; color: var(--border-color);
        }
        .level-card:hover { transform: scale(1.1); background: #fdfaf0; }
        
        /* สลับซ้าย-ขวาแบบซิกแซก */
        .level-card:nth-child(odd) { align-self: flex-start; margin-left: 10%; }
        .level-card:nth-child(even) { align-self: flex-end; margin-right: 10%; }
        
        .level-card.locked { background: #dcdde1; border-color: #7f8c8d; box-shadow: 4px 4px 0px #7f8c8d; color: #7f8c8d; cursor: not-allowed; }
        .level-card.locked:hover { transform: none; background: #dcdde1; }
        
        .footer-nav { text-align: center; margin-top: 40px; display: flex; justify-content: center; gap: 10px; }
        .btn-back { color: var(--border-color); font-weight: 700; text-decoration: none; border: 2px solid var(--border-color); padding: 8px 20px; border-radius: 50px; }
        .btn-reset { background: #ff7675; color: white; border: 2px solid var(--border-color); padding: 8px 20px; border-radius: 50px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2 id="page-title">...</h2>
    </div>

    <div class="level-grid" id="levelGrid"></div>
    
    <div class="footer-nav">
        <a href="game.html" class="btn-back">⬅ กลับหน้าหลัก</a>
        <button class="btn-reset" onclick="resetProgress()">🔄 รีเซ็ตด่าน</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'general';
        document.getElementById('page-title').innerText = (type === 'general') ? "📖 ประโยคทั่วไป" : "🏗️ ประโยคหน้างาน";

        const totalLevels = 20;
        const grid = document.getElementById('levelGrid');

        function renderLevels() {
            grid.innerHTML = '';
            for (let i = 1; i <= totalLevels; i++) {
                const card = document.createElement('a');
                const isUnlocked = (i === 1) || localStorage.getItem(`${type}_levelPassed_${i - 1}`);
                
                card.className = isUnlocked ? 'level-card' : 'level-card locked';
                card.innerHTML = `<span>${i}</span>`;
                
                if (isUnlocked) {
                    card.href = `quiz.html?type=${type}&level=${i}`;
                } else {
                    card.innerHTML = `<span>🔒</span>`;
                }
                grid.appendChild(card);
            }
        }

        function resetProgress() {
            if (confirm("คุณต้องการล้างความคืบหน้าของหมวดหมู่นี้ใช่หรือไม่?")) {
                for (let i = 1; i <= totalLevels; i++) {
                    localStorage.removeItem(`${type}_levelPassed_${i}`);
                }
                location.reload();
            }
        }

        renderLevels();
    </script>
</body>
</html>
