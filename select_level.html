<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - เลือกเลเวล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; min-height: 100vh; padding: 20px; }
        
        .header-box { text-align: center; margin-bottom: 40px; }
        .header-box h2 { font-weight: 900; color: var(--border-color); font-size: 2.5rem; }
        
        .level-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 600px; margin: 0 auto; }
        .level-card { 
            background: #fff; border: 4px solid var(--border-color); border-radius: 25px; 
            padding: 30px 10px; text-align: center; text-decoration: none; 
            color: var(--border-color); box-shadow: 6px 6px 0px var(--border-color); 
            transition: all 0.2s; cursor: pointer; font-weight: 900; font-size: 1.2rem;
        }
        .level-card:hover { transform: translateY(-5px); background: #fdfaf0; }
        .level-card:active { transform: translateY(0); box-shadow: 2px 2px 0px var(--border-color); }
        
        .btn-back { display: block; margin: 30px auto; color: var(--border-color); font-weight: 700; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2 id="page-title">...</h2>
    </div>

    <div class="level-grid" id="levelGrid"></div>
    
    <a href="game.html" class="btn-back">⬅ กลับไปหน้าเลือกหมวดหมู่</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        document.getElementById('page-title').innerText = (type === 'general') ? "📖 ประโยคทั่วไป" : "🏗️ ประโยคหน้างาน";

        const grid = document.getElementById('levelGrid');
        for (let i = 1; i <= 3; i++) {
            const card = document.createElement('a');
            card.href = `quiz.html?type=${type}&level=${i}`;
            card.className = 'level-card';
            card.innerHTML = `<div>ด่านที่</div><div style="font-size:2rem">${i}</div>`;
            grid.appendChild(card);
        }
    </script>
</body>
</html>
