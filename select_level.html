<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกเลเวล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f7f1e3; font-family: 'Kanit', sans-serif; text-align: center; padding: 20px; }
        .level-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; max-width: 500px; margin: 20px auto; }
        .level-card { background: #fff; border: 4px solid #2f3542; border-radius: 20px; padding: 20px; text-decoration: none; color: #2f3542; font-weight: 900; display: block; box-shadow: 4px 4px 0px #2f3542; }
    </style>
</head>
<body>
    <h2 id="page-title" class="fw-bold">เลือกด่าน</h2>
    <div class="level-grid" id="levelGrid"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        document.getElementById('page-title').innerText = (type === 'general') ? "📖 ประโยคทั่วไป" : "🏗️ ประโยคหน้างาน";

        const grid = document.getElementById('levelGrid');
        for (let i = 1; i <= 3; i++) {
            const card = document.createElement('a');
            card.href = `quiz.html?type=${type}&level=${i}`;
            card.className = 'level-card';
            card.innerHTML = `Level ${i}`;
            grid.appendChild(card);
        }
    </script>
</body>
</html>
