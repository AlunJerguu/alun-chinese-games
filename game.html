<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - เลือกหมวดหมู่</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; --general-color: #7bed9f; --work-color: #feca57; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; min-height: 100vh; }
        
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .brand-text { font-weight: 900; color: var(--border-color); font-size: 1.3rem; }
        
        .header-section { text-align: center; padding: 50px 20px 30px; }
        .header-section h1 { font-weight: 900; color: var(--border-color); font-size: 2.2rem; }
        
        .menu-container { max-width: 500px; margin: 0 auto; padding: 0 20px; }
        .menu-card { 
            background: #fff; border: 4px solid var(--border-color); border-radius: 25px; 
            padding: 25px; margin-bottom: 20px; text-decoration: none; 
            display: flex; align-items: center; color: var(--border-color);
            box-shadow: 6px 6px 0px var(--border-color); transition: all 0.2s; cursor: pointer;
        }
        .menu-card:hover { transform: translateY(-5px); }
        .menu-card:active { transform: translateY(0); box-shadow: 2px 2px 0px var(--border-color); }
        
        .icon-box { font-size: 2.5rem; margin-right: 20px; }
        .card-content h3 { font-weight: 900; margin: 0; }
        .card-content p { margin: 0; color: #57606f; }
        
        .btn-general { background: var(--general-color); }
        .btn-work { background: var(--work-color); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span class="brand-text">AlunchineseGames</span>
            </a>
        </div>
    </nav>

    <div class="header-section">
        <h1>เลือกหมวดหมู่</h1>
        <p class="text-muted">วันนี้อยากฝึกเรื่องอะไรดีครับ?</p>
    </div>

    <div class="menu-container">
        <div class="menu-card btn-general" onclick="window.location.href='select_level.html?type=general'">
            <div class="icon-box"><i class="bi bi-book-half"></i></div>
            <div class="card-content">
                <h3>ประโยคทั่วไป</h3>
                <p>ฝึกภาษาจีนสำหรับชีวิตประจำวัน</p>
            </div>
        </div>

        <div class="menu-card btn-work" onclick="window.location.href='select_level.html?type=work'">
            <div class="icon-box"><i class="bi bi-building-gear"></i></div>
            <div class="card-content">
                <h3>ประโยคหน้างาน</h3>
                <p>ภาษาจีนสำหรับงานโรงงานและรถยก</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
