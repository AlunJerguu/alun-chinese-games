<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlunchineseGames - เลือกบทเรียน</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f7f1e3; --border-color: #2f3542; }
        body { background: var(--bg-color); font-family: 'Kanit', sans-serif; overflow-x: hidden; }
        
        .navbar { border-bottom: 4px solid var(--border-color); background: #fdfaf0 !important; padding: 15px 0; }
        .brand-text { font-weight: 900; color: var(--border-color); font-size: 1.3rem; }
        .offcanvas { border-right: 4px solid var(--border-color); background: #fdfaf0; width: 80% !important; }

        .header-section { text-align: center; padding: 40px 20px 20px; }
        .header-section h1 { font-weight: 900; color: var(--border-color); font-size: 2rem; }

        .level-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 15px; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px; 
        }

        .level-card { 
            background: #fff; border: 4px solid var(--border-color); border-radius: 20px; 
            padding: 20px 10px; text-align: center; text-decoration: none; 
            color: var(--border-color); box-shadow: 4px 4px 0px var(--border-color); 
            transition: all 0.2s; cursor: pointer;
        }
        .level-card:active { transform: translateY(2px); box-shadow: 2px 2px 0px var(--border-color); }
        .level-number { font-size: 2rem; font-weight: 900; display: block; }
        .level-card.locked { background: #dcdde1; border-color: #7f8c8d; color: #7f8c8d; cursor: not-allowed; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg px-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="bi bi-translate fs-2 me-2 text-primary"></i>
                <span class="brand-text">AlunchineseGames</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
        <div class="offcanvas-header"><h5 class="fw-bold">เมนู</h5><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
        <div class="offcanvas-body">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">หน้าแรก</a></li>
                <li class="nav-item"><a class="nav-link" href="game.html">เริ่มเล่นเกม</a></li>
            </ul>
        </div>
    </div>

    <div class="header-section">
        <h1>เลือกบทเรียน</h1>
        <p class="text-muted">สะสมความรู้ให้ครบทุกด่าน!</p>
    </div>

    <div class="level-grid" id="levelGrid"></div>
    <!-- ส่วนของปุ่มรีเซ็ต -->
    <div id="resetContainer" class="text-center mt-3 mb-5"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function initLevels() {
            const grid = document.getElementById('levelGrid');
            const resetContainer = document.getElementById('resetContainer');
            try {
                const response = await fetch('data/levels_config.json');
                const config = await response.json();
                
                let allPassed = true;
                for (let i = 1; i <= config.total; i++) {
                    const isUnlocked = (i === 1) || (localStorage.getItem('levelPassed_' + (i - 1)) === 'true');
                    
                    const card = document.createElement(isUnlocked ? 'a' : 'div');
                    if (isUnlocked) card.href = `quiz.html?level=${i}`;
                    card.className = 'level-card ' + (isUnlocked ? '' : 'locked');
                    card.innerHTML = `
                        <span class="level-number">${isUnlocked ? i : '<i class="bi bi-lock-fill"></i>'}</span>
                        <span class="fw-bold">${isUnlocked ? 'Level ' + i : 'Locked'}</span>
                    `;
                    grid.appendChild(card);
                    
                    // เช็คว่าผ่านด่านสุดท้ายหรือยัง
                    if (i === config.total && localStorage.getItem('levelPassed_' + i) !== 'true') {
                        allPassed = false;
                    }
                }

                // ถ้าผ่านครบทุกด่าน แสดงปุ่มรีเซ็ต
                if (allPassed) {
                    resetContainer.innerHTML = `
                        <button class="btn btn-outline-danger btn-sm px-4" onclick="resetGame()">
                            <i class="bi bi-arrow-clockwise"></i> รีเซ็ตเกมใหม่
                        </button>`;
                }
            } catch (error) { grid.innerHTML = "<p class='text-center'>กำลังโหลดบทเรียน...</p>"; }
        }

        function resetGame() {
            if(confirm("ต้องการเริ่มใหม่ทั้งหมดใช่หรือไม่? ด่านจะถูกล็อกใหม่ทั้งหมด")) {
                Object.keys(localStorage).forEach(key => {
                    if(key.startsWith('levelPassed_')) localStorage.removeItem(key);
                });
                window.location.reload();
            }
        }
        initLevels();
    </script>
</body>
</html>
